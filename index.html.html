<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#12161d;
  --surface:#1b212b;
  --surface-2:#232a36;
  --line:#333c4a;
  --gold:#c9a15b;
  --gold-dim:#8a7448;
  --good:#5f9c78;
  --good-bg:#20302a;
  --bad:#c25f49;
  --bad-bg:#332221;
  --text:#eee9dd;
  --text-dim:#9aa2b0;
  --paper:#f2ede0;
  --paper-text:#2a2620;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--ink);}

h1,h2,h3,.serif{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line);}
.topbar .who{display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#1b1400;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Fraunces',serif;}
.who-name{font-weight:600;font-size:15px;}
.who-sub{font-size:11px;color:var(--text-dim);}
.switch-btn{background:none;border:1px solid var(--line);color:var(--text-dim);font-size:11px;padding:6px 10px;border-radius:20px;cursor:pointer;}
.switch-btn:hover{border-color:var(--gold-dim);color:var(--gold);}

.content{flex:1;padding:18px 20px 90px;overflow-y:auto;}
.screen{animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.section-title{font-size:13px;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin:22px 0 10px;font-weight:600;}
.section-title:first-child{margin-top:0;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 4px;}
.card-sub{font-size:12px;color:var(--text-dim);}

.progress-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.progress-track{flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s ease;}
.progress-fill.full{background:var(--good);}
.progress-label{font-size:12px;color:var(--text-dim);white-space:nowrap;}

.dot-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid var(--line);color:var(--text-dim);background:var(--surface-2);}
.dot.approved{background:var(--good-bg);border-color:var(--good);color:var(--good);}
.dot.pending{background:var(--surface-2);border-color:var(--gold-dim);color:var(--gold);}
.dot.rejected{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-gold{background:var(--gold);color:#1b1400;}
.btn-gold:hover{background:#d8b06b;}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--gold-dim);}
.btn-good{background:var(--good);color:#0d1a13;}
.btn-bad{background:var(--bad);color:#1d0d09;}
.btn-block{width:100%;margin-top:10px;}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}

input[type=text],input[type=number],select{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:9px;font-size:16px;font-family:'Inter',sans-serif;margin-top:6px;}
label{font-size:12px;color:var(--text-dim);display:block;margin-top:12px;}
.field-row{display:flex;gap:10px;}
.field-row > div{flex:1;}

.empty{text-align:center;padding:50px 10px;color:var(--text-dim);}
.empty .glyph{font-size:32px;margin-bottom:10px;opacity:.6;}
.empty p{font-size:13px;line-height:1.6;margin:0;}

.navbar{position:sticky;bottom:0;display:flex;background:var(--surface);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));max-width:480px;width:100%;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text-dim);padding:6px 2px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;position:relative;}
.nav-btn.active{color:var(--gold);}
.nav-btn svg{width:20px;height:20px;}
.badge{position:absolute;top:0;right:22%;background:var(--bad);color:var(--paper);font-size:9px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

.thumb{width:100%;border-radius:10px;display:block;margin-top:8px;cursor:pointer;object-fit:cover;max-height:220px;}
.thumb-row{display:flex;gap:8px;overflow-x:auto;margin-top:8px;}
.thumb-row img{width:70px;height:70px;border-radius:8px;object-fit:cover;cursor:pointer;flex-shrink:0;}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.lightbox img{max-width:100%;max-height:80vh;border-radius:8px;}

.stamp{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0) rotate(-18deg);font-family:'Fraunces',serif;font-weight:700;font-size:34px;border:4px solid;padding:10px 22px;border-radius:10px;z-index:200;pointer-events:none;opacity:0;}
.stamp.show{animation:stampin .6s cubic-bezier(.2,1.4,.4,1) forwards;}
.stamp.approve{color:var(--good);border-color:var(--good);}
.stamp.reject{color:var(--bad);border-color:var(--bad);}
@keyframes stampin{0%{opacity:0;transform:translate(-50%,-50%) scale(2.2) rotate(-18deg);}45%{opacity:1;transform:translate(-50%,-50%) scale(.95) rotate(-18deg);}60%{transform:translate(-50%,-50%) scale(1.08) rotate(-18deg);}75%{transform:translate(-50%,-50%) scale(1) rotate(-18deg);}100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(-18deg);}}

.receipt{background:var(--paper);color:var(--paper-text);border-radius:4px;padding:22px 18px;position:relative;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.receipt::before,.receipt::after{content:"";position:absolute;left:0;right:0;height:10px;background:radial-gradient(circle,var(--ink) 5px,transparent 5.5px);background-size:16px 16px;background-position:0 0;}
.receipt::before{top:-5px;}
.receipt::after{bottom:-5px;transform:scaleY(-1);}
.receipt h3{font-family:'Fraunces',serif;text-align:center;margin:0 0 2px;font-size:16px;letter-spacing:.03em;}
.receipt .rsub{text-align:center;font-size:11px;color:#6b6453;margin-bottom:14px;}
.receipt .rline{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed #c9c2ab;}
.receipt .rline.total{border-bottom:none;border-top:2px solid var(--paper-text);margin-top:6px;padding-top:10px;font-weight:700;font-size:15px;}
.receipt .rline .amt{font-family:'IBM Plex Mono',monospace;}
.receipt .rtag{font-size:10px;padding:2px 7px;border-radius:20px;margin-left:6px;}
.receipt .rtag.paid{background:#20302a;color:var(--good);}
.receipt .rtag.unpaid{background:#332221;color:var(--bad);}

.week-switch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.week-switch button{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 10px;cursor:pointer;}
.week-label{font-size:13px;font-weight:600;}

.profile-pick{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:30px;}
.profile-pick h1{font-size:24px;margin-bottom:2px;}
.profile-pick p{color:var(--text-dim);font-size:13px;margin-top:0;text-align:center;}
.profile-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.profile-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);padding:12px 14px;border-radius:12px;cursor:pointer;width:100%;}
.profile-item:hover{border-color:var(--gold-dim);}
.divider-or{color:var(--text-dim);font-size:11px;margin:14px 0;letter-spacing:.1em;}
.new-profile-box{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;}

.goal-manager-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--text-dim);}
.goal-manager-row select{width:auto;margin-top:0;padding:4px 8px;font-size:12px;}
.delete-x{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;}
.delete-x:hover{color:var(--bad);}

.status-pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;}
.status-pill.pending{background:var(--surface-2);color:var(--gold);border:1px solid var(--gold-dim);}
.status-pill.approved{background:var(--good-bg);color:var(--good);}
.status-pill.rejected{background:var(--bad-bg);color:var(--bad);}
</style>

<div id="root"></div>

<script>
(function(){
  const ICONS = {
    checkin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>',
    goals: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>',
    approve: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 2 3.5-.5 1 3.4L22 9l-2 3 2 3-2.5 2.1 1 3.4-3.5-.5L15 22l-3-2-3 2-3.5-2 -3.5.5 1-3.4L2 15l2-3-2-3 2.5-2.1-1-3.4 3.5.5L9 2z"/><path d="M9 12l2 2 4-4"/></svg>',
    settle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l3 3v17H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>'
  };

  let state = {
    booting: true,
    me: null,        // {id,name}
    users: [],
    goals: [],        // my goals
    allGoalsByUser: {}, // userId -> goals (for approval lookups)
    weekOffset: 0,    // 0 = this week, -1 = last week (used in checkin/settlement)
    monthOffset: 0,   // 0 = this month, -1 = last month
    tab: 'checkin',
    approvalQueue: [],
    lightbox: null
  };

  const root = document.getElementById('root');

  // ---------- storage helpers ----------
  // ---------- storage helpers (Firebase Realtime Database, no login needed) ----------
  const DB_URL = 'https://the-weight-of-a-promise-default-rtdb.firebaseio.com';

  async function sGet(key, shared){
    if (key === 'my_profile'){
      try{ return localStorage.getItem('my_profile'); } catch(e){ return null; }
    }
    try{
      const path = key.split(':').join('/');
      const res = await fetch(`${DB_URL}/${path}.json`);
      const data = await res.json();
      return (data === null || data === undefined) ? null : data;
    } catch(e){ console.error('db get failed', e); return null; }
  }
  async function sSet(key, value, shared){
    if (key === 'my_profile'){
      try{ localStorage.setItem('my_profile', value); return true; } catch(e){ return false; }
    }
    try{
      const path = key.split(':').join('/');
      await fetch(`${DB_URL}/${path}.json`, { method: 'PUT', body: JSON.stringify(value) });
      return true;
    } catch(e){ console.error('db set failed', e); return false; }
  }
  async function sList(prefix, shared){ return []; } // not used

  // ---------- date helpers ----------
  function pad(n){ return n<10?'0'+n:''+n; }
  function toKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function mondayOf(date){
    const d = new Date(date);
    const day = d.getDay(); // 0 sun .. 6 sat
    const diff = (day === 0 ? -6 : 1 - day);
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d;
  }
  function weekStartKey(offset){
    const base = mondayOf(new Date());
    base.setDate(base.getDate() + offset*7);
    return toKey(base);
  }
  function weekRangeLabel(offset){
    const base = mondayOf(new Date());
    base.setDate(base.getDate() + offset*7);
    const end = new Date(base); end.setDate(end.getDate()+6);
    const fmt = d => (d.getMonth()+1)+'/'+d.getDate();
    return fmt(base) + ' ~ ' + fmt(end) + (offset===0 ? ' (이번 주)' : offset===-1 ? ' (지난 주)' : '');
  }
  function fmtWon(n){ return Math.round(n).toLocaleString('ko-KR') + '원'; }

  function monthKeyString(offset){
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);
    return d.getFullYear()+'-'+pad(d.getMonth()+1);
  }
  function monthRangeLabel(offset){
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);
    return (d.getMonth()+1)+'월' + (offset===0?' (이번 달)': offset===-1?' (지난 달)':'');
  }
  function periodKeyForType(type, offset){
    return type === 'month' ? ('m' + monthKeyString(offset)) : ('w' + weekStartKey(offset));
  }
  function periodKeyFor(goal, offset){ return periodKeyForType(goal.periodType || 'week', offset); }
  function periodLabel(goal, offset){ return goal.periodType === 'month' ? monthRangeLabel(offset) : weekRangeLabel(offset); }
  function periodCountLabel(goal){ return (goal.periodType === 'month' ? '한 달 ' : '주 ') + goal.targetCount + '회'; }

  // ---------- image compress ----------
  function compressImage(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          const maxDim = 480;
          if (w > h){ if (w > maxDim){ h = h*maxDim/w; w = maxDim; } }
          else { if (h > maxDim){ w = w*maxDim/h; h = maxDim; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg', 0.55));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- data access ----------
  async function loadUsers(){
    const raw = await sGet('users', true);
    state.users = raw ? JSON.parse(raw) : [];
  }
  async function saveUsers(){
    await sSet('users', JSON.stringify(state.users), true);
  }
  async function loadMyGoals(){
    const raw = await sGet('goals:' + state.me.id, true);
    state.goals = raw ? JSON.parse(raw) : [];
  }
  async function saveMyGoals(){
    await sSet('goals:' + state.me.id, JSON.stringify(state.goals), true);
  }
  async function loadGoalsFor(userId){
    if (state.allGoalsByUser[userId]) return state.allGoalsByUser[userId];
    const raw = await sGet('goals:' + userId, true);
    const g = raw ? JSON.parse(raw) : [];
    state.allGoalsByUser[userId] = g;
    return g;
  }
  async function loadWeekData(userId, weekKey){
    const raw = await sGet('wk:' + userId + ':' + weekKey, true);
    return raw ? JSON.parse(raw) : {};
  }
  async function saveWeekData(userId, weekKey, data){
    await sSet('wk:' + userId + ':' + weekKey, JSON.stringify(data), true);
  }

  async function buildApprovalQueue(){
    const queue = [];
    await loadUsers();
    for (const u of state.users){
      if (u.id === state.me.id) continue;
      const goals = await loadGoalsFor(u.id);
      const myManaged = goals.filter(g => g.managerId === state.me.id);
      if (!myManaged.length) continue;
      for (const g of myManaged){
        for (const offset of [0,-1]){
          const pk = periodKeyFor(g, offset);
          const wd = await loadWeekData(u.id, pk);
          const gd = wd[g.id];
          if (!gd || !gd.entries) continue;
          gd.entries.forEach(entry => {
            if (entry.status === 'pending'){
              queue.push({ ownerId: u.id, ownerName: u.name, goal: g, entry, weekKey: pk });
            }
          });
        }
      }
    }
    state.approvalQueue = queue;
  }

  // ---------- render ----------
  function render(){
    if (state.booting){ root.innerHTML = '<div class="empty" style="padding-top:40vh;">불러오는 중...</div>'; return; }
    if (!state.me){ renderProfilePick(); return; }
    renderMain();
  }

  function renderProfilePick(){
    let list = state.users.map(u => `
      <div class="profile-item" onclick="app.pickProfile('${u.id}')">
        <div class="avatar">${u.name[0]}</div>
        <div>
          <div class="who-name">${escapeHtml(u.name)}</div>
          <div class="who-sub">이 프로필로 시작하기</div>
        </div>
      </div>`).join('');
    root.innerHTML = `
      <div class="app">
        <div class="profile-pick">
          <h1 class="serif">약속의 무게</h1>
          <p>돈을 걸고, 인증샷으로 증명하고,<br>서로가 서로의 관리자가 되는 루틴 계약서</p>
          ${list ? `<div class="profile-list">${list}</div><div class="divider-or">또는</div>` : ''}
          <div class="new-profile-box">
            <label>내 이름 입력하고 새로 시작</label>
            <input type="text" id="newNameInput" placeholder="예: 이지" />
            <button class="btn btn-gold btn-block" onclick="app.createProfile()">시작하기</button>
          </div>
        </div>
      </div>`;
  }

  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderMain(){
    const badgeCount = state.approvalQueue ? state.approvalQueue.length : 0;
    root.innerHTML = `
      <div class="app">
        <div class="topbar">
          <div class="who">
            <div class="avatar">${state.me.name[0]}</div>
            <div>
              <div class="who-name">${escapeHtml(state.me.name)}</div>
              <div class="who-sub">${weekRangeLabel(0)}</div>
            </div>
          </div>
          <button class="switch-btn" onclick="app.switchProfile()">다른 사람으로</button>
        </div>
        <div class="content" id="content"></div>
        <div class="navbar">
          <button class="nav-btn ${state.tab==='checkin'?'active':''}" onclick="app.setTab('checkin')">${ICONS.checkin}<span>체크인</span></button>
          <button class="nav-btn ${state.tab==='goals'?'active':''}" onclick="app.setTab('goals')">${ICONS.goals}<span>목표</span></button>
          <button class="nav-btn ${state.tab==='approve'?'active':''}" onclick="app.setTab('approve')">${ICONS.approve}${badgeCount?`<span class="badge">${badgeCount}</span>`:''}<span>승인대기</span></button>
          <button class="nav-btn ${state.tab==='settle'?'active':''}" onclick="app.setTab('settle')">${ICONS.settle}<span>정산</span></button>
        </div>
        ${state.lightbox ? `<div class="lightbox" onclick="app.closeLightbox()"><img src="${state.lightbox}"/></div>` : ''}
      </div>`;
    renderTab();
  }

  async function renderTab(){
    const content = document.getElementById('content');
    if (!content) return;
    content.innerHTML = '<div class="empty">불러오는 중...</div>';
    if (state.tab === 'checkin') await renderCheckin(content);
    else if (state.tab === 'goals') await renderGoals(content);
    else if (state.tab === 'approve') await renderApprove(content);
    else if (state.tab === 'settle') await renderSettle(content);
  }

  // ---- CHECK-IN TAB ----
  async function renderCheckin(content){
    await loadUsers();
    await loadMyGoals();
    if (!state.goals.length){
      content.innerHTML = `<div class="empty"><div class="glyph">◎</div><p>아직 설정한 목표가 없어요.<br>'목표' 탭에서 먼저 만들어보세요.</p></div>`;
      return;
    }
    const weekGoals = state.goals.filter(g => (g.periodType||'week') === 'week');
    const monthGoals = state.goals.filter(g => g.periodType === 'month');
    let html = '';
    if (weekGoals.length){
      html += `<div class="section-title">주간 체크인 · ${weekRangeLabel(0)}</div>`;
      for (const g of weekGoals) html += await goalCheckinCard(g);
    }
    if (monthGoals.length){
      html += `<div class="section-title">월간 체크인 · ${monthRangeLabel(0)}</div>`;
      for (const g of monthGoals) html += await goalCheckinCard(g);
    }
    content.innerHTML = html;
  }

  async function goalCheckinCard(g){
    const pk = periodKeyFor(g, 0);
    const wd = await loadWeekData(state.me.id, pk);
    const gd = wd[g.id] || { entries: [] };
    const approved = gd.entries.filter(e=>e.status==='approved').length;
    const pending = gd.entries.filter(e=>e.status==='pending').length;
    const pct = Math.min(100, Math.round((approved / g.targetCount) * 100));
    const managerName = (state.users.find(u=>u.id===g.managerId)||{}).name || '미지정';
    let dots = '';
    for (let i=0;i<g.targetCount;i++){
      const e = gd.entries[i];
      const cls = e ? e.status : '';
      dots += `<div class="dot ${cls}">${i+1}</div>`;
    }
    return `
        <div class="card">
          <div class="card-title">${escapeHtml(g.name)}</div>
          <div class="card-sub">${periodCountLabel(g)} · ${fmtWon(g.amount)} 걸림 · 관리자 ${escapeHtml(managerName)}</div>
          <div class="progress-row">
            <div class="progress-track"><div class="progress-fill ${approved>=g.targetCount?'full':''}" style="width:${pct}%"></div></div>
            <div class="progress-label">${approved}/${g.targetCount} 승인${pending?` · ${pending} 대기`:''}</div>
          </div>
          <div class="dot-row">${dots}</div>
          <input type="file" accept="image/*" style="display:none" id="file_${g.id}" onchange="app.uploadProof('${g.id}', this)" />
          <button class="btn btn-gold btn-block" onclick="document.getElementById('file_${g.id}').click()">📸 인증샷 올리기</button>
        </div>`;
  }

  // ---- GOALS TAB ----
  async function renderGoals(content){
    await loadUsers();
    await loadMyGoals();
    const otherUsers = state.users.filter(u => u.id !== state.me.id);
    let html = `<div class="section-title">내 목표</div>`;
    if (!state.goals.length){
      html += `<div class="empty"><div class="glyph">◎</div><p>아직 목표가 없어요.<br>아래에서 첫 목표를 추가해보세요.</p></div>`;
    } else {
      for (const g of state.goals){
        const managerOptions = otherUsers.map(u => `<option value="${u.id}" ${g.managerId===u.id?'selected':''}>${escapeHtml(u.name)}</option>`).join('');
        html += `
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div>
                <div class="card-title">${escapeHtml(g.name)} <span style="font-size:11px;color:var(--gold);font-weight:600;">${g.periodType==='month'?'월간':'주간'}</span></div>
                <div class="card-sub">${periodCountLabel(g)} · ${fmtWon(g.amount)}</div>
              </div>
              <button class="delete-x" onclick="app.deleteGoal('${g.id}')">✕</button>
            </div>
            <div class="goal-manager-row">
              <span>관리자(승인 담당)</span>
              <select onchange="app.setManager('${g.id}', this.value)">
                <option value="">미지정</option>
                ${managerOptions}
              </select>
            </div>
          </div>`;
      }
    }
    html += `
      <div class="section-title">새 목표 만들기</div>
      <div class="card">
        <label>목표 이름</label>
        <input type="text" id="ngName" placeholder="예: 헬스장 가기" />
        <label>주기</label>
        <select id="ngPeriod" onchange="app.refreshCountLabel()">
          <option value="week">주간 (매주 월요일 리셋)</option>
          <option value="month">월간 (매달 1일 리셋)</option>
        </select>
        <div class="field-row">
          <div>
            <label id="ngCountLabel">주당 목표 횟수</label>
            <input type="number" id="ngCount" min="1" value="3" />
          </div>
          <div>
            <label>거는 금액 (원)</label>
            <input type="number" id="ngAmount" min="0" step="1000" value="30000" />
          </div>
        </div>
        <label>관리자(승인 담당)</label>
        <select id="ngManager">
          <option value="">나중에 지정</option>
          ${otherUsers.map(u => `<option value="${u.id}">${escapeHtml(u.name)}</option>`).join('')}
        </select>
        ${!otherUsers.length ? `<div class="card-sub" style="margin-top:8px;">※ 친구가 아직 프로필을 만들지 않았어요. 친구가 이 앱을 열고 프로필을 만들면 관리자로 지정할 수 있어요.</div>` : ''}
        <button class="btn btn-gold btn-block" onclick="app.createGoal()">목표 추가</button>
      </div>`;
    content.innerHTML = html;
  }

  // ---- APPROVE TAB ----
  async function renderApprove(content){
    await buildApprovalQueue();
    if (!state.approvalQueue.length){
      content.innerHTML = `<div class="empty"><div class="glyph">✓</div><p>지금은 승인 대기 중인 인증이 없어요.</p></div>`;
      renderMain(); // refresh badge in nav
      return;
    }
    let html = `<div class="section-title">승인 대기 (${state.approvalQueue.length})</div>`;
    state.approvalQueue.forEach((item, idx) => {
      html += `
        <div class="card">
          <div class="card-title">${escapeHtml(item.ownerName)} · ${escapeHtml(item.goal.name)}</div>
          <div class="card-sub">${fmtWon(item.goal.amount)} 걸림 · ${item.entry.ts ? new Date(item.entry.ts).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</div>
          <img class="thumb" src="${item.entry.photo}" onclick="app.openLightbox('${item.entry.photo.replace(/'/g,"\\'")}')" />
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn btn-good" style="flex:1" onclick="app.decide(${idx}, 'approved', event)">승인</button>
            <button class="btn btn-bad" style="flex:1" onclick="app.decide(${idx}, 'rejected', event)">반려</button>
          </div>
        </div>`;
    });
    content.innerHTML = html;
  }

  // ---- SETTLE TAB ----
  async function renderSettle(content){
    await loadUsers();
    await loadMyGoals();
    if (!state.goals.length){
      content.innerHTML = `<div class="empty"><div class="glyph">🧾</div><p>정산할 목표가 없어요.</p></div>`;
      return;
    }
    const weekGoals = state.goals.filter(g => (g.periodType||'week') === 'week');
    const monthGoals = state.goals.filter(g => g.periodType === 'month');
    let html = '';
    if (weekGoals.length){
      html += `
        <div class="section-title">주간 정산</div>
        <div class="week-switch">
          <button onclick="app.shiftWeek(-1)">‹ 이전주</button>
          <div class="week-label">${weekRangeLabel(state.weekOffset)}</div>
          <button onclick="app.shiftWeek(1)" ${state.weekOffset>=0?'disabled style="opacity:.3"':''}>다음주 ›</button>
        </div>`;
      for (const g of weekGoals) html += await goalReceiptCard(g, state.weekOffset);
    }
    if (monthGoals.length){
      html += `
        <div class="section-title">월간 정산</div>
        <div class="week-switch">
          <button onclick="app.shiftMonth(-1)">‹ 이전달</button>
          <div class="week-label">${monthRangeLabel(state.monthOffset)}</div>
          <button onclick="app.shiftMonth(1)" ${state.monthOffset>=0?'disabled style="opacity:.3"':''}>다음달 ›</button>
        </div>`;
      for (const g of monthGoals) html += await goalReceiptCard(g, state.monthOffset);
    }
    content.innerHTML = html;
  }

  async function goalReceiptCard(g, offset){
    const pk = periodKeyFor(g, offset);
    const wd = await loadWeekData(state.me.id, pk);
    const gd = wd[g.id] || { entries: [], depositPaid:false, refundSettled:false };
    const approved = gd.entries.filter(e=>e.status==='approved').length;
    const ratio = Math.min(approved / g.targetCount, 1);
    const refund = Math.round(ratio * g.amount / 1000) * 1000;
    const managerName = (state.users.find(u=>u.id===g.managerId)||{}).name || '미지정';
    return `
        <div class="receipt">
          <h3>${escapeHtml(g.name)}</h3>
          <div class="rsub">${periodLabel(g, offset)} · 관리자 ${escapeHtml(managerName)}</div>
          <div class="rline"><span>목표</span><span class="amt">${approved} / ${g.targetCount} 회</span></div>
          <div class="rline"><span>보증금</span><span class="amt">${fmtWon(g.amount)}</span></div>
          <div class="rline total"><span>돌려받을 금액</span><span class="amt">${fmtWon(refund)}</span></div>
          <div class="rline" style="border-bottom:none;padding-top:10px;">
            <span>입금(내가 보냄) <span class="rtag ${gd.depositPaid?'paid':'unpaid'}">${gd.depositPaid?'완료':'대기'}</span></span>
            <button class="btn btn-ghost btn-sm" onclick="app.toggleDeposit('${g.id}', ${offset}, '${g.periodType||'week'}')">${gd.depositPaid?'취소':'표시'}</button>
          </div>
          <div class="rline" style="border-bottom:none;">
            <span>환급(내가 받음) <span class="rtag ${gd.refundSettled?'paid':'unpaid'}">${gd.refundSettled?'완료':'대기'}</span></span>
            <button class="btn btn-ghost btn-sm" onclick="app.toggleRefund('${g.id}', ${offset}, '${g.periodType||'week'}')">${gd.refundSettled?'취소':'표시'}</button>
          </div>
        </div>`;
  }

  // ---------- app actions ----------
  const app = {
    async pickProfile(id){
      const u = state.users.find(x=>x.id===id);
      if (!u) return;
      state.me = u;
      await sSet('my_profile', JSON.stringify(u), false);
      render();
    },
    async createProfile(){
      const input = document.getElementById('newNameInput');
      const name = input.value.trim();
      if (!name){ input.focus(); return; }
      await loadUsers();
      const id = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      const u = { id, name, createdAt: new Date().toISOString() };
      state.users.push(u);
      await saveUsers();
      state.me = u;
      await sSet('my_profile', JSON.stringify(u), false);
      render();
    },
    switchProfile(){
      if (!confirm('다른 사람으로 전환할까요? 지금 프로필과는 로그아웃됩니다.')) return;
      state.me = null;
      sSet('my_profile', '', false);
      render();
    },
    async setTab(tab){
      state.tab = tab;
      renderMain();
    },
    async createGoal(){
      const name = document.getElementById('ngName').value.trim();
      const periodType = document.getElementById('ngPeriod').value;
      const count = parseInt(document.getElementById('ngCount').value) || 1;
      const amount = parseInt(document.getElementById('ngAmount').value) || 0;
      const managerId = document.getElementById('ngManager').value;
      if (!name){ return; }
      const g = { id: 'g_' + Date.now(), name, periodType, targetCount: count, amount, managerId: managerId || null, createdAt: new Date().toISOString() };
      state.goals.push(g);
      await saveMyGoals();
      renderTab();
    },
    async deleteGoal(id){
      if (!confirm('이 목표를 삭제할까요?')) return;
      state.goals = state.goals.filter(g=>g.id!==id);
      await saveMyGoals();
      renderTab();
    },
    async setManager(goalId, managerId){
      const g = state.goals.find(x=>x.id===goalId);
      if (!g) return;
      g.managerId = managerId || null;
      await saveMyGoals();
    },
    async uploadProof(goalId, inputEl){
      const file = inputEl.files[0];
      if (!file) return;
      const g = state.goals.find(x=>x.id===goalId);
      if (!g) return;
      const dataUrl = await compressImage(file);
      const pk = periodKeyFor(g, 0);
      const wd = await loadWeekData(state.me.id, pk);
      if (!wd[goalId]) wd[goalId] = { entries: [], depositPaid:false, refundSettled:false };
      wd[goalId].entries.push({ id: 'e_'+Date.now(), photo: dataUrl, ts: Date.now(), status: 'pending' });
      await saveWeekData(state.me.id, pk, wd);
      inputEl.value = '';
      renderTab();
    },
    refreshCountLabel(){
      const period = document.getElementById('ngPeriod').value;
      const lbl = document.getElementById('ngCountLabel');
      if (lbl) lbl.textContent = period === 'month' ? '한 달 목표 횟수' : '주당 목표 횟수';
    },
    openLightbox(src){ state.lightbox = src; renderMain(); state.tab='approve'; renderTab(); },
    closeLightbox(){ state.lightbox = null; renderMain(); },
    async decide(idx, decision, evt){
      const item = state.approvalQueue[idx];
      if (!item) return;
      const wd = await loadWeekData(item.ownerId, item.weekKey);
      const gd = wd[item.goal.id];
      const entry = gd.entries.find(e=>e.id===item.entry.id);
      if (entry) entry.status = decision;
      await saveWeekData(item.ownerId, item.weekKey, wd);
      showStamp(decision === 'approved' ? 'approve' : 'reject', decision === 'approved' ? '승인' : '반려');
      state.allGoalsByUser = {}; // force refresh
      setTimeout(()=>renderTab(), 550);
    },
    shiftWeek(dir){
      const next = state.weekOffset + dir;
      if (next > 0) return;
      state.weekOffset = next;
      renderTab();
    },
    shiftMonth(dir){
      const next = state.monthOffset + dir;
      if (next > 0) return;
      state.monthOffset = next;
      renderTab();
    },
    async toggleDeposit(goalId, offset, periodType){
      const pk = periodKeyForType(periodType, offset);
      const wd = await loadWeekData(state.me.id, pk);
      if (!wd[goalId]) wd[goalId] = { entries: [], depositPaid:false, refundSettled:false };
      wd[goalId].depositPaid = !wd[goalId].depositPaid;
      await saveWeekData(state.me.id, pk, wd);
      renderTab();
    },
    async toggleRefund(goalId, offset, periodType){
      const pk = periodKeyForType(periodType, offset);
      const wd = await loadWeekData(state.me.id, pk);
      if (!wd[goalId]) wd[goalId] = { entries: [], depositPaid:false, refundSettled:false };
      wd[goalId].refundSettled = !wd[goalId].refundSettled;
      await saveWeekData(state.me.id, pk, wd);
      renderTab();
    }
  };
  window.app = app;

  function showStamp(kind, label){
    const el = document.createElement('div');
    el.className = 'stamp ' + kind;
    el.textContent = label;
    document.body.appendChild(el);
    requestAnimationFrame(()=> el.classList.add('show'));
    setTimeout(()=> el.remove(), 700);
  }

  // ---------- boot ----------
  async function boot(){
    try{
      await loadUsers();
      const myRaw = await sGet('my_profile', false);
      if (myRaw){
        const parsed = JSON.parse(myRaw);
        // re-sync with users list in case name changed
        const fresh = state.users.find(u=>u.id===parsed.id);
        state.me = fresh || parsed;
      }
    } catch(e){ console.error(e); }
    state.booting = false;
    render();
    if (state.me) await buildApprovalQueue().then(()=> { if(state.tab!=='approve') renderMain(); });
  }
  boot();
})();
</script>
